---
- name: deploy vsftpd
  hosts: server2
  tasks: 
  - name: install vsftpd
    yum:
     name: vsftpd
  - name: enable vsftpd  
    service: 
         name: vsftpd 
         enabled: true
  - name: create readme file
    copy:
      content: "Welcome to FTP server"
      dest: /var/ftp/pub/README
      force: no
      mode: 0444
...
